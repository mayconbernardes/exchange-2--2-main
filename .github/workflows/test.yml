name: CI - Testes Flask

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install pytest eventlet
          echo "Dependências instaladas:"
          python3 -m pip freeze

      - name: 🔍 Debug - Preparar Ambiente e Verificar Importação
        continue-on-error: true
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "test-secret-key"
          PYTHONPATH: ${{ github.workspace }}
          MONGO_URI: "mongodb://127.0.0.1:27017/?serverSelectionTimeoutMS=100"
        run: |
          echo "Criando pastas necessárias para o ambiente CI..."
          mkdir -p flask_session static/audio static/img static/doc
          echo "Tentando importar o app e capturar o erro exato:"
          python3 -c "import sys; sys.path.insert(0, '${{ github.workspace }}'); 
          try:
              import app
              print('✅ App importado com sucesso!')
          except Exception as e:
              import traceback
              traceback.print_exc()
              sys.exit(1)"

      - name: 🧪 Executar Diagnóstico e Testes
        env:
          SECRET_KEY: "test-secret-key"
          FLASK_ENV: "testing"
          TESTING: "true"
          DATABASE_URL: "sqlite:///:memory:"
          MONGO_URI: "mongodb://127.0.0.1:27017/?serverSelectionTimeoutMS=100"
          MAIL_SERVER: "localhost"
          MAIL_PORT: "8025"
          MAIL_USE_TLS: "false"
          MAIL_USERNAME: "test@example.com"
          MAIL_PASSWORD: "password"
          MAIL_DEFAULT_SENDER: "test@example.com"
          PYTHONPATH: ${{ github.workspace }}
        run: python3 -m pytest tests/ -v --tb=long
