name: CI - Testes Flask

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install pytest eventlet
          echo "Dependências instaladas:"
          python3 -m pip freeze

      - name: 🔍 Debug - Preparar Ambiente e Verificar Importação
        continue-on-error: true
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "test-secret-key"
          PYTHONPATH: ${{ github.workspace }}
          MONGO_URI: "mongodb://127.0.0.1:27017/?serverSelectionTimeoutMS=100"
        run: |
          echo "Criando pastas para o ambiente CI..."
          mkdir -p flask_session static/audio static/img static/doc
          echo "Tentando importar o app rapidamente:"
          python3 -c "import sys; sys.path.insert(0, '${{ github.workspace }}'); import app; print('✅ App importado!')"

      - name: 🧪 Executar Testes para o Júri
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python3 -m pytest tests/test_projeto_juri.py -v
