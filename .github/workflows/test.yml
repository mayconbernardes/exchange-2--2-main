name: CI - Testes Flask

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: 🔍 Debug - Verificar ambiente e importação
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: test-secret-key
          PYTHONPATH: .
        run: |
          echo "Listando ficheiros no repositório:"
          ls -R
          echo "Versões das bibliotecas instaladas:"
          pip show flask pytest
          echo "Tentando importar o app para ver erros de dependência:"
          python -c "import app; print('✅ App importado com sucesso!')"

      - name: 🧪 Executar testes com pytest
        env:
          SECRET_KEY: test-secret-key
          FLASK_ENV: testing
          TESTING: "true"
          DATABASE_URL: "sqlite:///:memory:"
          PYTHONPATH: .
        run: python -m pytest tests/ -v
